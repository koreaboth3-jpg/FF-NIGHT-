<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF 🇵🇰 Night Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            font-family: 'Press Start 2P', system-ui;
            background: #000;
        }
        .neon-orange { 
            text-shadow: 0 0 10px #ff8800, 0 0 20px #ff8800; 
        }
        .neon-green { 
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; 
        }
        .card {
            transition: all 0.4s ease;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(255, 100, 0, 0.6);
        }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- Navbar -->
    <nav class="bg-zinc-950 border-b border-orange-500 p-3 fixed w-full z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🔥</span>
                <div>
                    <h1 class="text-xl font-bold neon-orange">FF NIGHT BATTLE</h1>
                    <p class="text-[10px] text-green-400">🇵🇰 PAKISTAN</p>
                </div>
            </div>
            <div class="bg-green-600 text-white text-xs px-4 py-1 rounded-full font-bold">8:00 PM</div>
        </div>
    </nav>

    <div class="pt-20 max-w-md mx-auto px-4 pb-24">

        <!-- HOME SCREEN -->
        <div id="home-screen" class="screen">
            <div class="bg-gradient-to-br from-zinc-900 to-black border border-orange-500 rounded-3xl p-6 text-center card">
                <h2 class="text-3xl font-bold neon-orange mb-1">NIGHT BATTLE #48</h2>
                <p class="text-orange-400">TONIGHT • 8:00 PM</p>

                <div class="my-8 grid grid-cols-2 gap-4">
                    <div class="bg-black/70 p-5 rounded-2xl">
                        <p class="text-xs text-gray-400">ENTRY FEE</p>
                        <p class="text-2xl font-bold text-orange-400">20 PKR</p>
                    </div>
                    <div class="bg-black/70 p-5 rounded-2xl">
                        <p class="text-xs text-gray-400">PRIZE</p>
                        <p class="text-2xl font-bold text-yellow-400">15 💎</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="showScreen('login')" class="py-4 bg-green-600 hover:bg-green-500 rounded-2xl text-sm font-bold">LOGIN</button>
                    <button onclick="showScreen('register')" class="py-4 bg-orange-600 hover:bg-orange-500 rounded-2xl text-sm font-bold">REGISTER</button>
                </div>

                <button onclick="googleLogin()" class="mt-6 w-full bg-white text-black py-4 rounded-2xl flex items-center justify-center gap-3 font-bold text-sm">
                    <i class="fab fa-google text-red-500"></i> CONTINUE WITH GOOGLE
                </button>
            </div>
        </div>

        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="screen hidden">
            <div class="bg-zinc-900 rounded-3xl p-8">
                <h2 class="text-2xl font-bold text-center mb-6">LOGIN</h2>
                <input type="email" placeholder="Gmail Address" class="w-full p-4 bg-zinc-800 rounded-2xl mb-4 text-sm">
                <input type="password" placeholder="Password" class="w-full p-4 bg-zinc-800 rounded-2xl mb-6 text-sm">
                <button onclick="loginUser()" class="w-full py-4 bg-green-600 rounded-2xl font-bold">LOGIN NOW</button>
                <button onclick="showScreen('home')" class="w-full mt-4 text-gray-400 text-sm">← Back</button>
            </div>
        </div>

        <!-- TOURNAMENT SCREEN -->
        <div id="tournament-screen" class="screen hidden">
            <div class="bg-gradient-to-br from-purple-950 to-black border-2 border-yellow-400 rounded-3xl p-6 card">
                <h2 class="text-center text-3xl font-bold neon-orange">NIGHT BATTLE #48</h2>
                <p class="text-center text-green-400 mt-2">STARTS AT 8:00 PM</p>

                <div class="my-8 flex justify-center gap-8">
                    <div class="text-center">
                        <p class="text-xs text-gray-400">ENTRY</p>
                        <p class="text-3xl font-bold text-orange-400">20 PKR</p>
                    </div>
                    <div class="text-center">
                        <p class="text-xs text-gray-400">PRIZE</p>
                        <p class="text-3xl font-bold text-yellow-400">15 💎</p>
                    </div>
                </div>

                <button onclick="showPayment()" class="w-full py-6 bg-gradient-to-r from-orange-500 to-red-500 text-lg font-bold rounded-3xl">
                    PAY 20 PKR & JOIN
                </button>
                <p class="text-center text-xs text-gray-400 mt-6">
                    JazzCash: <span class="text-white font-bold">03245150474</span>
                </p>
            </div>
        </div>

        <!-- PAYMENT SCREEN -->
        <div id="payment-screen" class="screen hidden">
            <div class="bg-zinc-900 rounded-3xl p-8 text-center">
                <h3 class="text-xl font-bold mb-4">JazzCash Payment</h3>
                <div class="text-6xl font-bold text-green-400 my-6">20 PKR</div>
                <p class="text-sm">Send to</p>
                <p class="text-2xl font-bold text-white my-3">0324-5150474</p>
                
                <input type="file" id="proof" accept="image/*" class="w-full mt-8 text-sm bg-zinc-800 p-3 rounded-2xl">
                
                <button onclick="submitPayment()" class="mt-8 w-full py-5 bg-green-600 rounded-3xl font-bold text-lg">
                    SUBMIT PAYMENT PROOF
                </button>
            </div>
        </div>
    </div>

    <script>
        function showScreen(screenName) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.add('hidden');
            });
            const activeScreen = document.getElementById(screenName + '-screen');
            if (activeScreen) {
                activeScreen.classList.remove('hidden');
            }
        }

        function googleLogin() {
            alert("✅ Google Login Successful!");
            showScreen('tournament');
        }

        function loginUser() {
            alert("✅ Login Successful!");
            showScreen('tournament');
        }

        function showPayment() {
            showScreen('payment');
        }

        function submitPayment() {
            const file = document.getElementById('proof').files[0];
            if (file) {
                alert("✅ Payment Proof Received!\n\nYou will get Room ID & Password at 7:45 PM.\nGood Luck!");
            } else {
                alert("Please upload transaction screenshot");
            }
        }

        // Start with home screen
        window.onload = () => {
            showScreen('home');
        };
    </script>
</body>
</html>
